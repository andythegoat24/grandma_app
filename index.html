<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿嬤溝通板-iOS穩定版</title>
    <style>
        :root { --yes-color: #28a745; --no-color: #dc3545; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; background: #f8f9fa; }
        
        /* 設定模式 */
        #setup-zone { padding: 20px; display: flex; flex-direction: column; gap: 15px; height: 100%; justify-content: center; max-width: 500px; margin: 0 auto; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        input { padding: 15px; font-size: 1.2rem; border: 3px solid #6f42c1; border-radius: 10px; }
        #start-btn { padding: 20px; font-size: 1.5rem; background: #6f42c1; color: white; border: none; border-radius: 15px; font-weight: bold; }

        /* 溝通介面 */
        #interface { display: none; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 100; background: black; }
        
        /* 問題區域：點了才會唸問題 */
        #question-bar { 
            height: 20%; background: #333; color: #fff; display: flex; align-items: center; 
            justify-content: center; font-size: 5vw; padding: 10px; text-align: center;
            border-bottom: 2px solid #555;
        }

        .btn-container { display: flex; height: 80%; width: 100%; }
        .btn-half { flex: 1; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; text-align: center; padding: 15px; }
        .btn-half span { font-size: clamp(40px, 12vw, 100px); line-height: 1.2; }
        
        #left-side { background-color: var(--yes-color); border-right: 4px solid white; }
        #right-side { background-color: var(--no-color); }

        /* 手機直立模式 */
        @media screen and (max-width: 500px) and (orientation: portrait) {
            #question-bar { font-size: 7vw; height: 25%; }
            .btn-container { flex-direction: column; height: 75%; }
            #left-side { border-right: none; border-bottom: 4px solid white; }
        }

        .back-btn { position: absolute; top: 10px; right: 10px; padding: 5px 15px; background: rgba(255,255,255,0.2); color: white; border-radius: 10px; font-size: 0.8rem; border: 1px solid white; }
    </style>
</head>
<body>

    <div id="setup-zone">
        <h2 style="text-align:center;">溝通設定</h2>
        <div class="input-group">
            <label>問題：</label>
            <input type="text" id="q-input" value="阿嬤，你要喝水嗎？">
        </div>
        <div class="input-group">
            <label>左邊文字：</label>
            <input type="text" id="l-input" value="要喝">
        </div>
        <div class="input-group">
            <label>右邊文字：</label>
            <input type="text" id="r-input" value="不喝">
        </div>
        <button id="start-btn" onclick="start()">進入溝通模式</button>
    </div>

    <div id="interface">
        <div id="question-bar" onclick="playQuestion()">
            <span id="q-text">問題加載中...</span>
            <span style="font-size: 0.8rem; display: block; opacity: 0.7;">(點我唸問題)</span>
        </div>
        <button class="back-btn" onclick="exit()">返回</button>
        <div class="btn-container">
            <div id="left-side" class="btn-half" onclick="playLeft()"><span id="left-text"></span></div>
            <div id="right-side" class="btn-half" onclick="playRight()"><span id="right-text"></span></div>
        </div>
    </div>

    <script>
        let qVal, lVal, rVal;

        function play(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            u.rate = 0.7;
            window.speechSynthesis.speak(u);
        }

        function start() {
            // iOS 關鍵：在使用者點擊按鈕的這一瞬間，播放一段空聲音來解鎖
            window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
            
            qVal = document.getElementById('q-input').value;
            lVal = document.getElementById('l-input').value;
            rVal = document.getElementById('r-input').value;
            
            document.getElementById('q-text').innerText = qVal;
            document.getElementById('left-text').innerText = lVal;
            document.getElementById('right-text').innerText = rVal;
            
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('interface').style.display = 'block';
        }

        function playQuestion() { play(qVal); }
        function playLeft() { play(lVal); }
        function playRight() { play(rVal); }
        function exit() {
            document.getElementById('setup-zone').style.display = 'flex';
            document.getElementById('interface').style.display = 'none';
        }
    </script>
</body>
</html>
