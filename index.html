<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿嬤溝通板-語音修正版</title>
    <style>
        :root { --yes-color: #28a745; --no-color: #dc3545; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: sans-serif; overflow: hidden; background: #f8f9fa; }
        
        #setup-zone { 
            padding: 20px; display: flex; flex-direction: column; gap: 15px; 
            height: 100%; overflow-y: auto; justify-content: center; max-width: 500px; margin: 0 auto; 
        }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 1.1rem; font-weight: bold; }
        input { padding: 12px; font-size: 1.2rem; border: 2px solid #6f42c1; border-radius: 8px; width: 100%; }
        #start-btn { 
            margin-top: 10px; padding: 20px; font-size: 1.5rem; 
            background: #6f42c1; color: white; border: none; border-radius: 15px; 
            cursor: pointer; font-weight: bold; 
        }

        #interface { display: none; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 100; background: white; }
        .btn-container { display: flex; height: 100%; width: 100%; flex-direction: row; }
        .btn-half { 
            flex: 1 1 50%; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: white; text-align: center; padding: 15px; 
        }
        .btn-half span { font-size: clamp(35px, 12vw, 100px); line-height: 1.2; display: block; width: 100%; word-wrap: break-word; }
        #left-side { background-color: var(--yes-color); border: 4px solid white; }
        #right-side { background-color: var(--no-color); border: 4px solid white; }

        @media screen and (max-width: 500px) and (orientation: portrait) {
            .btn-container { flex-direction: column; }
            .btn-half { flex: 1 1 50%; width: 100%; }
            .btn-half span { font-size: clamp(45px, 18vw, 120px); }
        }
        .back-btn { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); padding: 8px 25px; background: rgba(0,0,0,0.7); color: white; border-radius: 20px; z-index: 101; }
    </style>
</head>
<body>

    <div id="setup-zone">
        <h2 style="text-align:center;">溝通設定</h2>
        <div class="input-group">
            <label>問題：</label>
            <input type="text" id="q-input" value="阿嬤，你要喝水嗎？">
        </div>
        <div class="input-group">
            <label>左邊/上面 文字：</label>
            <input type="text" id="l-input" value="要喝">
        </div>
        <div class="input-group">
            <label>右邊/下面 文字：</label>
            <input type="text" id="r-input" value="不喝">
        </div>
        <button id="start-btn" onclick="initAndStart()">進入溝通模式</button>
    </div>

    <div id="interface">
        <button class="back-btn" onclick="exitInterface()">⬅ 返回修改</button>
        <div class="btn-container">
            <div id="left-side" class="btn-half" onclick="speakLeft()"><span id="left-text"></span></div>
            <div id="right-side" class="btn-half" onclick="speakRight()"><span id="right-text"></span></div>
        </div>
    </div>

    <script>
        let q, l, r;
        const synth = window.speechSynthesis;

        // 核心修正：強制解鎖語音引擎
        function unlockAudio() {
            const silent = new SpeechSynthesisUtterance("");
            synth.speak(silent);
        }

        function playVoice(text) {
            if (!text) return;
            synth.cancel(); // 停止目前所有聲音
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'zh-TW';
            u.rate = 0.7; // 慢速
            u.pitch = 1.0;
            synth.speak(u);
        }

        function initAndStart() {
            // 1. 先解鎖語音
            unlockAudio();
            
            // 2. 獲取數值
            q = document.getElementById('q-input').value;
            l = document.getElementById('l-input').value;
            r = document.getElementById('r-input').value;
            
            document.getElementById('left-text').innerText = l;
            document.getElementById('right-text').innerText = r;
            
            // 3. 切換畫面
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('interface').style.display = 'block';
            
            // 4. 唸出問題
            setTimeout(() => playVoice(q), 500);
        }

        function speakLeft() { playVoice(l); }
        function speakRight() { playVoice(r); }

        function exitInterface() {
            document.getElementById('setup-zone').style.display = 'flex';
            document.getElementById('interface').style.display = 'none';
        }
    </script>
</body>
</html>
