<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>阿嬤溝通板-通用版</title>
    <style>
        :root { --yes-color: #28a745; --no-color: #dc3545; --text-color: #ffffff; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; background: #f0f2f5; }
        
        /* 設定區域 (輸入問題) */
        #setup-zone { padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px; display: flex; flex-direction: column; gap: 15px; height: 100vh; box-sizing: border-box; justify-content: center; max-width: 600px; margin: 0 auto; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 1.2rem; font-weight: bold; color: #333; }
        input { padding: 12px; font-size: 1.5rem; border: 3px solid #6f42c1; border-radius: 10px; -webkit-appearance: none; }
        .btn-row { display: flex; gap: 10px; margin-top: 10px; }
        button { padding: 15px; font-size: 1.2rem; border-radius: 10px; border: none; cursor: pointer; font-weight: bold; }
        #test-btn { background: #6c757d; color: white; flex: 1; }
        #start-btn { background: #6f42c1; color: white; flex: 2; }
        
        /* 溝通介面 (大按鈕) */
        #interface { display: none; height: 100vh; width: 100vw; position: fixed; top: 0; left: 0; z-index: 100; }
        .btn-container { display: flex; height: 100%; width: 100%; flex-direction: row; /* 預設是左右對分 */ }
        
        .btn-half { 
            flex: 1; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: var(--text-color); text-align: center; 
            padding: 20px; box-sizing: border-box; 
            /* 使用 clamp 讓文字在 40px 到 120px 之間自動縮放，適應不同螢幕 */
            font-size: clamp(40px, 10vw, 120px); 
            line-height: 1.1;
            word-break: break-all; /* 防止長字不換行 */
        }
        
        #left-side { background-color: var(--yes-color); border-right: 6px solid white; }
        #right-side { background-color: var(--no-color); }
        
        /* 返回按鈕：在手機上稍微調小一點，避免擋到選項 */
        .back-btn { 
            position: absolute; top: calc(env(safe-area-inset-top) + 10px); left: 50%; 
            transform: translateX(-50%); padding: 8px 20px; font-size: 1rem; 
            background: rgba(0,0,0,0.6); color: white; border-radius: 20px; z-index: 101; 
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* ----- 核心：手機 (直立模式) 的響應式設定 ----- */
        @media (max-width: 600px) and (orientation: portrait) {
            .btn-container { flex-direction: column; /* 從左右變成上下 */ }
            #left-side { border-right: none; border-bottom: 6px solid white; /* 邊框也從右邊移到下面 */ }
            .btn-half { font-size: clamp(50px, 15vh, 100px); /* 手機上下模式文字可以更大一點 */ padding: 10px; }
        }
    </style>
</head>
<body>

    <div id="setup-zone">
        <h2 style="text-align:center; color:#6f42c1;">設定溝通內容</h2>
        <div class="input-group">
            <label>問題：</label>
            <input type="text" id="q-input" value="阿嬤，你要喝水嗎？">
        </div>
        <div class="btn-row">
            <div class="input-group" style="flex:1;">
                <label>左邊/上面 (是)：</label>
                <input type="text" id="l-input" value="要喝">
            </div>
            <div class="input-group" style="flex:1;">
                <label>右邊/下面 (否)：</label>
                <input type="text" id="r-input" value="不喝">
            </div>
        </div>
        <div class="btn-row">
            <button id="test-btn" onclick="testVoice()">先試聽聲音</button>
            <button id="start-btn" onclick="applySettings()">進入溝通模式</button>
        </div>
    </div>

    <div id="interface">
        <button class="back-btn" onclick="exitInterface()">⬅ 返回修改</button>
        <div class="btn-container">
            <div id="left-side" class="btn-half" onclick="speakText('left')"><span id="left-text">要喝</span></div>
            <div id="right-side" class="btn-half" onclick="speakText('right')"><span id="right-text">不喝</span></div>
        </div>
    </div>

    <script>
        let qVal, lVal, rVal;

        // 語音播放函數
        function speak(text) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-TW'; 
            utter.rate = 0.7; // 調慢語速
            utter.pitch = 1.0;
            window.speechSynthesis.speak(utter);
        }

        function testVoice() {
            speak(document.getElementById('q-input').value);
        }

        function applySettings() {
            qVal = document.getElementById('q-input').value;
            lVal = document.getElementById('l-input').value;
            rVal = document.getElementById('r-input').value;

            document.getElementById('left-text').innerText = lVal;
            document.getElementById('right-text').innerText = rVal;
            
            // 切換介面
            document.getElementById('setup-zone').style.display = 'none';
            document.getElementById('interface').style.display = 'block';

            // 進入時唸出問題
            setTimeout(() => speak(qVal), 500);
        }

        function speakText(side) {
            speak(side === 'left' ? lVal : rVal);
        }

        function exitInterface() {
            document.getElementById('setup-zone').style.display = 'flex';
            document.getElementById('interface').style.display = 'none';
        }

        // 喚醒語音引擎 (針對 iOS Safari)
        document.body.addEventListener('click', function() {
            const temp = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(temp);
        }, { once: true });
    </script>
</body>
</html>
